<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Bana Mesaj Yolla</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .container {
      background: rgba(255, 255, 255, 0.05);
      padding: 2rem;
      border-radius: 16px;
      backdrop-filter: blur(10px);
      width: 100%;
      max-width: 420px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    h2 {
      margin-bottom: 1rem;
      font-size: 1.5rem;
    }

    p {
      font-size: 0.9rem;
      margin-bottom: 1rem;
      color: #cbd5f5;
      line-height: 1.4;
    }

    label {
      display: block;
      margin-top: 0.5rem;
      font-size: 0.85rem;
      color: #e2e8f0;
    }

    input, textarea {
      width: 100%;
      padding: 0.75rem;
      margin-top: 0.4rem;
      border-radius: 10px;
      border: none;
      outline: none;
      background: rgba(255,255,255,0.1);
      color: white;
    }

    textarea {
      resize: none;
      height: 120px;
    }

    button {
      margin-top: 1rem;
      width: 100%;
      padding: 0.75rem;
      border-radius: 10px;
      border: none;
      background: #6366f1;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #4f46e5;
    }
  </style>
</head>

<body>
  <div class="container">
    <h2>✉️ Bana bir mesaj bırak</h2>

    <p>
      İnsanların bana email/mesaj yollayabilmesi için yaptığım basit bir site. <br> <br>
      Site zaten açık kaynak kodlu hiçbir veri kaydedilmiyor, fakat yine de güvenmeyenler tamamen rastgele bir email bile yazabilir  <br> <br>
    </p>

    <form action="https://formspree.io/f/xzdynrbv" method="POST">
      
      <label>Email:</label>
      <input type="email" name="email" placeholder="ornek@email.com">

      <label>Mesajın:</label>
      <textarea name="message" placeholder="Mesajını buraya yaz..."></textarea>

      <button type="submit">Gönder</button>

    </form>
  </div>
</body>
</html>
